<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Monitor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 1.4em;
      margin-bottom: 8px;
      color: #00d4ff;
    }
    #status {
      text-align: center;
      font-size: 0.85em;
      color: #888;
      margin-bottom: 20px;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      width: 140px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .card .label {
      font-size: 0.78em;
      color: #888;
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 1.8em;
      font-weight: bold;
    }
    .card .unit {
      font-size: 0.72em;
      color: #666;
      margin-top: 4px;
    }
    .card.spl   .value { color: #00d4ff; }
    .card.temp  .value { color: #ff6b6b; }
    .card.hum   .value { color: #00ff88; }
    .card.pres  .value { color: #ffd700; }

    /* SPLレベルインジケータ */
    .spl-meter {
      background: #16213e;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .spl-meter h2 {
      font-size: 0.9em;
      color: #888;
      margin-bottom: 10px;
    }
    .meter-bar-bg {
      background: #2a2a4e;
      border-radius: 6px;
      height: 28px;
      position: relative;
      overflow: hidden;
    }
    .meter-bar {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease, background 0.5s ease;
      width: 0%;
    }
    .meter-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72em;
      color: #555;
      margin-top: 4px;
    }

    .chart-container {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .chart-container h2 {
      font-size: 0.9em;
      color: #888;
      margin-bottom: 12px;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .controls button {
      background: #16213e;
      color: #00d4ff;
      border: 1px solid #00d4ff;
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 0.85em;
    }
    .controls button.active {
      background: #00d4ff;
      color: #1a1a2e;
      font-weight: bold;
    }
    #last-updated {
      text-align: center;
      color: #555;
      font-size: 0.8em;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>🎙 Sound Monitor Dashboard</h1>
  <div id="status">接続中...</div>

  <!-- カード -->
  <div class="cards">
    <div class="card spl">
      <div class="label">最新 SPL</div>
      <div class="value" id="spl-val">--</div>
      <div class="unit">dB</div>
    </div>
    <div class="card temp">
      <div class="label">温度</div>
      <div class="value" id="temp-val">--</div>
      <div class="unit">°C</div>
    </div>
    <div class="card hum">
      <div class="label">湿度</div>
      <div class="value" id="hum-val">--</div>
      <div class="unit">%</div>
    </div>
    <div class="card pres">
      <div class="label">気圧</div>
      <div class="value" id="pres-val">--</div>
      <div class="unit">hPa</div>
    </div>
  </div>

  <!-- SPLレベルインジケータ -->
  <div class="spl-meter">
    <h2>SPL レベルインジケータ</h2>
    <div class="meter-bar-bg">
      <div class="meter-bar" id="spl-bar"></div>
    </div>
    <div class="meter-labels">
      <span>40 dB</span>
      <span>60 dB</span>
      <span>80 dB</span>
      <span>100 dB</span>
    </div>
  </div>

  <!-- 表示範囲コントロール -->
  <div class="controls">
    <button onclick="setRange(30)"  id="btn-30">直近5分</button>
    <button onclick="setRange(60)"  id="btn-60" class="active">直近10分</button>
    <button onclick="setRange(180)" id="btn-180">直近30分</button>
    <button onclick="setRange(360)" id="btn-360">直近1時間</button>
    <button onclick="setRange(8640)" id="btn-8640">直近1日</button>
  </div>

  <!-- SPLグラフ -->
  <div class="chart-container">
    <h2>SPL 時系列グラフ（10秒平均）</h2>
    <canvas id="splChart"></canvas>
  </div>

  <!-- 環境グラフ -->
  <div class="chart-container">
    <h2>温度 / 湿度 時系列グラフ</h2>
    <canvas id="envChart"></canvas>
  </div>

  <!-- 気圧グラフ -->
  <div class="chart-container">
    <h2>気圧 時系列グラフ</h2>
    <canvas id="presChart"></canvas>
  </div>

  <div id="last-updated">最終更新: --</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, query, orderByChild, limitToLast }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ===== ここを書き換えてください =====
    const firebaseConfig = {
      	apiKey: "AIzaSyArRu4Cu0b3-LeSbyhRsnKr4_295nTJdSU",
  	authDomain: "m5stack-sound-monitor.firebaseapp.com",
  	databaseURL: "https://m5stack-sound-monitor-default-rtdb.asia-southeast1.firebasedatabase.app",
  	projectId: "m5stack-sound-monitor",
  	storageBucket: "m5stack-sound-monitor.firebasestorage.app",
  	messagingSenderId: "200555319529",
  	appId: "1:200555319529:web:12199146d7fd9abdece078"
    };
    // =====================================

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    let maxPoints = 60;

    // グラフ共通オプション
    const gridColor = "#2a2a4e";
    const tickColor = "#888";

    const commonScales = (yLabel) => ({
      x: {
        ticks: { color: tickColor, maxTicksLimit: 8 },
        grid:  { color: gridColor }
      },
      y: {
        ticks: { color: tickColor },
        grid:  { color: gridColor },
        title: { display: true, text: yLabel, color: tickColor }
      }
    });

    // SPLグラフ
    const splChart = new Chart(document.getElementById("splChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: "SPL (dB)",
          data: [],
          borderColor: "#00d4ff",
          backgroundColor: "rgba(0,212,255,0.1)",
          borderWidth: 2,
          pointRadius: 2,
          tension: 0.3,
          fill: true
        }]
      },
     options: {
    	responsive: true,
    	animation: false,
    	scales: {
      		x: {
        		ticks: { color: tickColor, maxTicksLimit: 8 },
        		grid:  { color: gridColor }
      		},
      		y: {
        		min: 30,   // ← 追加
        		max: 100,  // ← 追加
        		ticks: { color: tickColor },
        		grid:  { color: gridColor },
        		title: { display: true, text: "dB", color: tickColor }
      		}
    	},
    	plugins: { legend: { labels: { color: tickColor } } }
      }
    });

    // 温度・湿度グラフ
    const envChart = new Chart(document.getElementById("envChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [
          {
            label: "温度 (°C)",
            data: [],
            borderColor: "#ff6b6b",
            backgroundColor: "rgba(255,107,107,0.1)",
            borderWidth: 2,
            pointRadius: 2,
            tension: 0.3,
            fill: false,
            yAxisID: "yTemp"
          },
          {
            label: "湿度 (%)",
            data: [],
            borderColor: "#00ff88",
            backgroundColor: "rgba(0,255,136,0.1)",
            borderWidth: 2,
            pointRadius: 2,
            tension: 0.3,
            fill: false,
            yAxisID: "yHum"
          }
        ]
      },
      options: {
        responsive: true,
        animation: false,
        scales: {
          x: {
            ticks: { color: tickColor, maxTicksLimit: 8 },
            grid:  { color: gridColor }
          },
          yTemp: {
    		type: "linear",
    		position: "left",
    		min: 0,    // ← 追加
    		max: 50,   // ← 追加
    		ticks: { color: "#ff6b6b" },
    		grid:  { color: gridColor },
    		title: { display: true, text: "温度 (°C)", color: "#ff6b6b" }
	  },
	  yHum: {
    		type: "linear",
    		position: "right",
    		min: 0,    // ← 追加
    		max: 100,  // ← 追加
    		ticks: { color: "#00ff88" },
    		grid:  { drawOnChartArea: false },
    		title: { display: true, text: "湿度 (%)", color: "#00ff88" }
	  },
        },
        plugins: { legend: { labels: { color: tickColor } } }
      }
    });

    // 気圧グラフ
    const presChart = new Chart(document.getElementById("presChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: "気圧 (hPa)",
          data: [],
          borderColor: "#ffd700",
          backgroundColor: "rgba(255,215,0,0.1)",
          borderWidth: 2,
          pointRadius: 2,
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
    animation: false,
    scales: {
      	x: {
        	ticks: { color: tickColor, maxTicksLimit: 8 },
        	grid:  { color: gridColor }
      	},
      	y: {
        	min: 950,   // ← 追加
        	max: 1050,  // ← 追加
        	ticks: { color: tickColor },
        	grid:  { color: gridColor },
        	title: { display: true, text: "hPa", color: tickColor }
      	}
    },
        plugins: { legend: { labels: { color: tickColor } } }
      }
    });

    // SPLレベルインジケータ更新
    function updateMeter(spl) {
      const splMin = 40;
      const splMax = 100;
      const pct = Math.min(100, Math.max(0,
        (spl - splMin) / (splMax - splMin) * 100
      ));
      const bar = document.getElementById("spl-bar");
      bar.style.width = pct + "%";

      if (spl < 60)      bar.style.background = "#00ff88";
      else if (spl < 80) bar.style.background = "#ffd700";
      else               bar.style.background = "#ff4444";
    }

    // 10分ごとにグループ化して平均を計算
    function groupByMinutes(dataList, minutes) {
        const groups = {};
        const ms = minutes * 60 * 1000;

        dataList.forEach(item => {
            const time = new Date(item.timestamp).getTime();
            const groupKey = Math.floor(time / ms) * ms;
            if (!groups[groupKey]) {
                groups[groupKey] = {
                    spl: [], temperature: [], humidity: [], pressure: []
                };
            }
            if (item.spl         !== undefined) groups[groupKey].spl.push(item.spl);
            if (item.temperature !== undefined) groups[groupKey].temperature.push(item.temperature);
            if (item.humidity    !== undefined) groups[groupKey].humidity.push(item.humidity);
            if (item.pressure    !== undefined) groups[groupKey].pressure.push(item.pressure);
        });

        // 各グループの平均を計算
        return Object.entries(groups).sort((a, b) => a[0] - b[0]).map(([key, val]) => {
            const avg = arr => arr.length > 0
                ? arr.reduce((s, v) => s + v, 0) / arr.length
                : undefined;
            return {
                timestamp: new Date(parseInt(key)).toLocaleTimeString("ja-JP", {
                    hour: "2-digit", minute: "2-digit"
                }),
                spl:         avg(val.spl),
                temperature: avg(val.temperature),
                humidity:    avg(val.humidity),
                pressure:    avg(val.pressure)
            };
        });
    }


    // グラフ更新
    function updateCharts(dataList) {
      // 直近1日の場合は10分平均に変換
      const processedList = maxPoints >= 8640
          ? groupByMinutes(dataList, 10)
          : dataList;

      const labels   = [];
      const splData  = [];
      const tempData = [];
      const humData  = [];
      const presData = [];

      processedList.forEach(item => {
        if (item.spl === undefined) return;

        // 直近1日の場合はtimestampがすでに文字列
        const time = maxPoints >= 8640
            ? item.timestamp
            : (item.timestamp !== "unknown"
                ? new Date(item.timestamp).toLocaleTimeString("ja-JP")
                : "--:--:--");

        labels.push(time);
        splData.push(parseFloat(item.spl.toFixed(1)));
        if (item.temperature !== undefined) tempData.push(parseFloat(item.temperature.toFixed(1)));
        if (item.humidity    !== undefined) humData.push(parseFloat(item.humidity.toFixed(1)));
        if (item.pressure    !== undefined) presData.push(parseFloat(item.pressure.toFixed(1)));
    });

        // SPLグラフ更新
        splChart.data.labels = labels;
        splChart.data.datasets[0].data = splData;
        splChart.update();

        // 環境グラフ更新
        envChart.data.labels = labels;
        envChart.data.datasets[0].data = tempData;
        envChart.data.datasets[1].data = humData;
        envChart.update();

        // 気圧グラフ更新
        presChart.data.labels = labels;
        presChart.data.datasets[0].data = presData;
        presChart.update();

        // 最新値をカードに表示
        const latest = dataList.filter(i => i.spl !== undefined).pop();
        if (latest) {
            document.getElementById("spl-val").textContent  = latest.spl.toFixed(1);
            document.getElementById("temp-val").textContent = latest.temperature !== undefined ? latest.temperature.toFixed(1) : "--";
            document.getElementById("hum-val").textContent  = latest.humidity    !== undefined ? latest.humidity.toFixed(1)    : "--";
            document.getElementById("pres-val").textContent = latest.pressure    !== undefined ? latest.pressure.toFixed(1)    : "--";

            updateMeter(latest.spl);

            const now = new Date().toLocaleTimeString("ja-JP");
            document.getElementById("last-updated").textContent = "最終更新: " + now;
            document.getElementById("status").textContent = "接続中 ✅ リアルタイム受信";
        }
    }

    // Firebaseからデータ取得
    // リスナー管理用
    let currentUnsubscribe = null;

    // Firebaseからデータ取得
    function fetchData() {
        // 既存のリスナーを解除
        if (currentUnsubscribe) {
            currentUnsubscribe();
            currentUnsubscribe = null;
        }

        const dataQuery = query(
            ref(db, "sound_data"),
            orderByChild("timestamp"),
            limitToLast(maxPoints)
        );

        currentUnsubscribe = onValue(dataQuery, (snapshot) => {
            const raw = snapshot.val();
            if (!raw) return;

            const dataList = Object.values(raw)
                .filter(item => item.timestamp && item.timestamp !== "unknown")
                .sort((a, b) => {
                    if (a.timestamp < b.timestamp) return -1;
                    if (a.timestamp > b.timestamp) return 1;
                    return 0;
                });

            updateCharts(dataList);
        });
    }

    // 表示範囲切り替え
    window.setRange = (points) => {
        maxPoints = points;
        document.querySelectorAll(".controls button").forEach(btn => {
            btn.classList.remove("active");
        });
        document.getElementById("btn-" + points).classList.add("active");
        fetchData();  // リスナーを付け替え
    };

    fetchData();
  </script>
</body>
</html>
